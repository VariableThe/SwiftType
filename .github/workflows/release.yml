name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build macOS Application & Create Release
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Xcode Developer Path
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Extract Version from Tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build and Bundle SwiftType.app
        run: |
          chmod +x scripts/bundle_app.sh
          ./scripts/bundle_app.sh "${VERSION}"

      - name: Create or Update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "SwiftType ${VERSION}" \
              --generate-notes \
              --verify-tag
          fi

          gh release upload "${GITHUB_REF_NAME}" build/SwiftType.zip --clobber
